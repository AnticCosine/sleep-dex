<div class="wrapper">
    <div class="pokemon-finder">

        <app-pokemon-filters
          [filterState]="filterState"
        />

        @if (filterState.filteredPokemon$ | async; as pokemons) {
            <div class="pokemon-cards">
                @for (pokemon of pokemons; track pokemon.id) {
                    <app-pokemon-card
                        [pokemon]="pokemon">
                    </app-pokemon-card>
                }    
            </div>
        }
    </div>

</div>
