<div class="wrapper">
    <div class="recipe-finder">
    
        <app-recipe-filters
          [filterState]="filterState"
          [showFormatToggle]="false"
          (formatChange)="changeRecipeFormat()"
        />
        
        @if (filterState.filteredRecipes$ | async; as recipes) {
          @if (tabularFormat) {
            <div class="recipe-table">
              <app-recipe-table [recipes]="recipes"></app-recipe-table>
            </div>
          } @else {
            <div class="recipe-cards">
              
              @for (recipe of recipes; track recipe.id) {
                  <app-recipe-card
                      [recipe]="recipe">
                  </app-recipe-card>
              }
              
            </div>
          }
        }
    
    </div>
</div>
