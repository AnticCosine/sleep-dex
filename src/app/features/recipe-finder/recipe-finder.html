<div class="wrapper">
    <div class="recipe-finder">
    
        <input placeholder="Search Recipes" type="text" name="text" class="input">
    
        <div class="recipes">
            @if (recipes$ | async; as recipes) {
                @for (recipe of recipes; track recipe) {
                    <app-recipe-card
                        [recipe]="recipe">
                    </app-recipe-card>
                }
            }
        </div>
    
    </div>
</div>
