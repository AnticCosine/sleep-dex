<footer class="footer">
  <div class="separator"></div>

  <div class="footer-inner">
    
    <div class="footer-name">
      <a routerLink="/" class="name">sleep-dex</a>
    </div>

    <div class="footer-section">
      <h4>Links</h4>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">home</a>
      <a routerLink="/recipes" routerLinkActive="active">recipes</a>
      <a routerLink="/ingredients" routerLinkActive="active">ingredients</a>
    </div>

    <div class="footer-section">
      <h4>Feedback</h4>
      <div class="feedback-form">
        <textarea
          [(ngModel)]="feedbackText"
          id="feedback"
          [disabled]="sending || submitted">
        </textarea>
        <button (click)="sendFeedback()" [disabled]="sending || submitted">
          {{ submitted ? 'sent!' : error ? 'already sent feedback, try again later.' : 'send feedback' }}
        </button>
      </div>
    </div>

  </div>

  <div class="footer-bottom-wrapper">
    <div class="footer-bottom">
      <span>© 2026 sleep-dex</span>
    </div>
  </div>

</footer>
