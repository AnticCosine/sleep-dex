<footer class="footer">
  <div class="separator"></div>

  <div class="footer-inner">
    
    <div class="footer-name">
      <a routerLink="/" class="name">sleep-dex</a>
    </div>

    <div class="footer-section">
      <h4>Links</h4>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/pokemon" routerLinkActive="active">Pokemon</a>
      <a routerLink="/recipes" routerLinkActive="active">Recipes</a>
      <a routerLink="/ingredients" routerLinkActive="active">Ingredients</a>
    </div>

    <div class="footer-section">
      <h4>Contact</h4>
      <a href="mailto:anticcosine@gmail.com">Mail</a>
    </div>

    <div class="footer-section">
      <h4>Feedback</h4>
      <div class="feedback-form">
        <textarea
          [(ngModel)]="feedbackText"
          id="feedback"
          [disabled]="sending || submitted"
          placeholder="Feel free to send feedback, report bugs or suggest features">
        </textarea>
        <button (click)="sendFeedback()" [disabled]="sending || submitted">
          {{ submitted ? 'Sent!' : error ? 'Already sent feedback, try again later.' : 'Send feedback' }}
        </button>
      </div>
    </div>

  </div>

  <div class="footer-bottom-wrapper">
    <div class="footer-bottom">
      <span>© 2026 sleep-dex</span>
      <a href="https://github.com/AnticCosine/sleep-dex" target="_blank" rel="noopener noreferrer" class="github-link">
        <img src="assets/images/github_icon.svg" alt="" class="github-icon">
        Github
      </a>
    </div>
  </div>

</footer>
