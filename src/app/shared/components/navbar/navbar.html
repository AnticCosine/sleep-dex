<div class="navbar">
    <div class="navbar-inner">
        <ul>
            <li class="main"><a routerLink="/" >sleep-dex</a></li>

            <div class="nav-links">
                <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
                <li><a routerLink="/recipes" routerLinkActive="active">Recipes</a></li>
                <li><a routerLink="/ingredients" routerLinkActive="active">Ingredients</a></li>
                
                <li>
                    <button class="theme-btn" (click)="themeService.toggle()">
                    
                      <img src="assets/images/sun_icon.svg" width="18" height="18" alt="" *ngIf="themeService.isDark">
                      <img src="assets/images/moon_icon.svg" width="18" height="18" alt="" *ngIf="!themeService.isDark">
                    </button>
                </li>
                
                
            </div>

            <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </ul>
    </div>
    <div class="seperator"></div>
    <div class="mobile-drawer" [class.open]="menuOpen">
        <a routerLink="/" routerLinkActive="active" (click)="toggleMenu()" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/recipes" routerLinkActive="active" (click)="toggleMenu()">Recipes</a>
        <a routerLink="/ingredients" routerLinkActive="active" (click)="toggleMenu()">Ingredients</a>
        
        <button class="theme-btn drawer-theme-btn" (click)="themeService.toggle()" [title]="themeService.isDark ? 'Switch to light mode' : 'Switch to dark mode'">
            <img src="assets/images/sun_icon.svg" width="18" height="18" alt="" *ngIf="themeService.isDark">
            <img src="assets/images/moon_icon.svg" width="18" height="18" alt="" *ngIf="!themeService.isDark">
        </button>
        
    </div>

</div>
