<div class="first-filter">
  <input placeholder="Search Recipes" type="text" class="input" id="search" autocomplete="off" [formControl]="filterState.searchControl">

  <div class="input-buttons">
    <button class="button-icon" (click)="changeRecipeFormat()" *ngIf="!mobileView">
      <img src="assets/images/table_icon.svg" alt="">
    </button>

    <button class="button-icon" (click)="filterState.resetFilters(); magnezoneProcs = 0; sundayBonus = false; this.filterState.applySundayBonus(this.sundayBonus);">
      <img src="assets/images/reset_icon.svg" alt="">
    </button>
  </div>
</div>

<div class="filters">

    <div class="dropdown-filters">

        <div class="type-chips-row"> 
          <button class="chip curry" [class.active]="filterState.recipeTypeControl.value?.includes('curry')" (click)="filterState.toggleRecipeType('curry')">Curry</button>
          <button class="chip dessert" [class.active]="filterState.recipeTypeControl.value?.includes('dessert')" (click)="filterState.toggleRecipeType('dessert')">Dessert</button>
          <button class="chip salad" [class.active]="filterState.recipeTypeControl.value?.includes('salad')" (click)="filterState.toggleRecipeType('salad')">Salad</button>
        </div>

        

        <div class="cooked-chips-row">
          <details class="dropdown" (click)="onDropdownToggle($event)">
            <summary class="ingredient-dropdown">Ingredients</summary>

            <div class="ingredient-grid">

                @if (filterState.ingredients$ | async; as ingredients) {
                  @for (ingredient of ingredients; track ingredient) {
                    <div class="ingredient-item" [class.selected]="filterState.ingredientControl.value?.includes(ingredient.id)" (click)="filterState.toggleIngredient(ingredient.id)">

                      @if (filterState.hasIngredient(ingredient.id)) {
                        <img [src]="filterState.imageIngredientPath(ingredient.id)" alt="" class="ingredient-checked">
                      } @else {
                        <img [src]="filterState.imageIngredientPath(ingredient.id)" alt="" class="ingredient-unchecked">
                      }

                    </div>
                  }
                }
            </div>
          </details>
          <button class="chip neutral" [class.active]="filterState.cookedRecipeControl.value?.includes('cooked')" (click)="filterState.toggleCookedRecipeType('cooked')">Cooked</button>
          <button class="chip neutral" [class.active]="filterState.cookedRecipeControl.value?.includes('uncooked')" (click)="filterState.toggleCookedRecipeType('uncooked')">Uncooked</button>
        </div>

    </div>
          
    <div class="input-filters">
        <div class="pot-size-pill">
              <div class="pot-size-pill-icon">
                <img src="assets/images/pot_icon.png" alt="" class="pot-icon">
              </div>
              <input id="min-ingredient-input" type="number" class="min-ingredient-input" [formControl]="filterState.minIngredientsControl" *ngIf="!ingredeintPlaceHolder">
              <span class="pot-separator" *ngIf="!ingredeintPlaceHolder">–</span>
              <input id="max-ingredient-input" type="number" class="max-ingredient-input" [formControl]="filterState.maxIngredientsControl" *ngIf="!ingredeintPlaceHolder">

              <input id="pot-ingredient-input" type="number" class="pot-ingredient-input" [formControl]="filterState.potIngredientControl" *ngIf="ingredeintPlaceHolder">

              <ng-container *ngIf="effectivePotSize !== null && ingredeintPlaceHolder">
                <span class="pot-arrow">→</span>
                <span class="pot-effective">{{ effectivePotSize }}</span>
              </ng-container>
        </div>

        <button class="chip sunday-chip" [class.active]="sundayBonus" (click)="toggleSundayBonus()" *ngIf="ingredeintPlaceHolder">
          <img src="assets/images/sunday_icon.png" alt="" class="sunday-icon">
          Sunday
        </button>

        <div class="mag-stepper" *ngIf="ingredeintPlaceHolder">
          <button class="mag-icon-btn" [class.on]="magnezoneProcs > 0" (click)="cycleMagnezone()">
            <img [src]="'assets/images/magnezone_' + magnezoneProcs + '.png'" alt="Magnezone" class="mag-img">
          </button>
          <button class="step-btn" (click)="decrementMagnezone()">−</button>
          <div class="mag-mid">
            
            <span class="mag-bonus">
              <span class="mag-lv">lv </span> {{ magnezoneLevel }}
            </span>
          </div>
          <button class="step-btn" (click)="incrementMagnezone()">+</button>
        </div>
    </div>
          
          
</div>
